<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esfera Interativa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="esfera" id="bola"></div>

    <script>
        const esfera = document.getElementById('bola');

        // Função que gera uma cor aleatória em Hexadecimal
        function gerarCorAleatoria() {
            const caracteres = '0123456789ABCDEF';
            let cor = '#';
            for (let i = 0; i < 6; i++) {
                cor += caracteres[Math.floor(Math.random() * 16)];
            }
            return cor;
        }

        // Altera a cor quando o mouse entra na esfera
        esfera.addEventListener('mouseenter', () => {
            const novaCor = gerarCorAleatoria();
            // Atualiza o gradiente mantendo o efeito de sombra
            esfera.style.background = `radial-gradient(circle at 75px 75px, ${novaCor}, #000)`;
        });
    </script>
</body>
</html>
